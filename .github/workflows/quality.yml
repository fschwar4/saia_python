name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[lint]"

      - name: Ruff lint
        run: ruff check saia_python tests

      - name: Ruff format check
        run: ruff format --check saia_python tests

      - name: Mypy
        run: mypy
