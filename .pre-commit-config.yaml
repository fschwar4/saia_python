# Enable locally with `pre-commit install`. Update pins with `pre-commit autoupdate`.
# mypy is intentionally CI-only (it needs the project's dependencies installed).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      # Scope ruff to library + tests, matching the Quality CI workflow. docs/conf.py
      # uses Sphinx's idiomatic late imports (E402) and the notebooks are demos.
      - id: ruff
        args: [--fix]
        files: ^(saia_python|tests)/
      - id: ruff-format
        files: ^(saia_python|tests)/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
